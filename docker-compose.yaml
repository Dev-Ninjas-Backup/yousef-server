services:
  caddy:
    image: caddy:2-alpine
    container_name: yousef_server_caddy
    restart: always
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/config/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - yousef-network

  app:
    image: ${DOCKER_USERNAME}/yousef_server:latest
    container_name: yousef_server
    profiles:
      - prod
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-yousef_user}:${POSTGRES_PASSWORD:-yousef123Pass}@db:5432/${POSTGRES_DB:-yousef_db}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - yousef-file_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - yousef-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    profiles:
      - dev
      - prod
    container_name: yousef-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-yousef_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yousef123Pass}
      - POSTGRES_DB=${POSTGRES_DB:-yousef_db}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5442:5432"
    volumes:
      - yousef_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-yousef_user} -d ${POSTGRES_DB:-yousef_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - yousef-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"

volumes:
  yousef-file_data:
    driver: local
  yousef_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  yousef-network:
    driver: bridge
