services:
  caddy:
    image: caddy
    container_name: yousef_server_caddy
    restart: always
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    image: ${DOCKER_USERNAME}/yousef_server:latest
    container_name: yousef_server
    profiles:
      - prod
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - yousef-file_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:3000"]
    networks:
      - yousef-network

  db:
    image: postgres:16-alpine
    profiles:
      - dev
      - prod
    container_name: yousef-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-yousef_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yousef123Pass}
      - POSTGRES_DB=${POSTGRES_DB:-yousef_db}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5442:5432"
    volumes:
      - yousef_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-yousef_user} -d ${POSTGRES_DB:-yousef_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - yousef-network

volumes:
  yousef-file_data:
    driver: local
  yousef_data:
    driver: local

networks:
  yousef-network:
    driver: bridge
