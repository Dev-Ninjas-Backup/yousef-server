# If NestJS runs in Docker → use @db:5432
# If NestJS runs locally → use @localhost:5442
services:
  server:
    container_name: yousef-server
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - 5050:5050
    depends_on:
      - db
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm run start:prod
      "

  db:
    image: postgres:17
    container_name: yousef
    restart: always
    user: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yousef
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5442:5432"

volumes:
  db-data:
