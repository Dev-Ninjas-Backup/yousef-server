name: Lint, Format, Build, Push & Deploy

on:
   push:
      branches: [main]
   pull_request:
      branches:
         - "**"

jobs:
   ci-check:
      name: Lint, Format, Build
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v3

         - name: Setup Node.js
           uses: actions/setup-node@v3
           with:
              node-version: 24

         - name: Install dependencies
           run: npm install

         - name: Run Lint
           run: npm run lint

         - name: Build Project
           run: npm run build

   build-and-push:
      name: Build and Push Docker Image
      runs-on: ubuntu-latest
      needs: ci-check
      if: github.ref == 'refs/heads/main'

      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Log in to Docker Hub
           uses: docker/login-action@v3
           with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Build and Push Docker image
           uses: docker/build-push-action@v5
           with:
              context: .
              push: true
              tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest

   deploy:
      name: Deploy
      runs-on: ubuntu-latest
      needs: build-and-push
      if: github.ref == 'refs/heads/main'

      steps:
         - uses: actions/checkout@v4

         - name: Login to Docker Hub
           uses: docker/login-action@v3
           with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Copy Compose File
           uses: appleboy/scp-action@v0.1.7
           with:
              host: ${{ secrets.EC2_HOST }}
              username: ${{ secrets.EC2_USER }}
              key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
              source: "docker-compose.prod.yaml"
              target: "/home/${{ secrets.EC2_USER }}/yousef-server"

         - name: Copy .env File
           uses: appleboy/scp-action@v0.1.7
           with:
              host: ${{ secrets.EC2_HOST }}
              username: ${{ secrets.EC2_USER }}
              key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
              source: ".env"
              target: "/home/${{ secrets.EC2_USER }}/yousef-server"

         - name: Deploy via SSH
           uses: appleboy/ssh-action@v1.0.3
           with:
              host: ${{ secrets.EC2_HOST }}
              username: ${{ secrets.EC2_USER }}
              key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
              script: |
                 cd /home/${{ secrets.EC2_USER }}/yousef-server
                 mv docker-compose.prod.yaml docker-compose.yaml
                 sudo docker-compose pull
                 sudo docker-compose down
                 sudo docker-compose up -d
                 sudo docker system prune -f
