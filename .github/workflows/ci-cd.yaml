name: Lint, Format, Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  ci-check:
    name: Lint, Format, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Install missing type definitions
        run: npm install --save-dev @types/body-parser @types/jsonwebtoken

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Project
        run: npm run build

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest
          no-cache: true
          platforms: linux/amd64

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -e  # Exit on any error
            
            echo "========================================="
            echo "Starting deployment process..."
            echo "========================================="
            
            # Navigate to project directory
            cd /home/${{ secrets.EC2_USER }}/yousef-server
            
            # Export environment variables needed for docker-compose
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export PACKAGE_NAME=${{ secrets.PACKAGE_NAME }}
            
            echo "✓ Changed to project directory"
            
            # Login to Docker Hub
            echo "========================================="
            echo "Logging in to Docker Hub..."
            echo "========================================="
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            echo "✓ Docker Hub login successful"
            
            # Stop running containers
            echo "========================================="
            echo "Stopping running containers..."
            echo "========================================="
            docker compose --profile prod down || true
            echo "✓ Containers stopped"
            
            # Remove old app image to force fresh pull
            echo "========================================="
            echo "Removing old Docker images..."
            echo "========================================="
            docker rmi -f ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest || true
            echo "✓ Old images removed"
            
            # Pull latest images from Docker Hub
            echo "========================================="
            echo "Pulling latest Docker images..."
            echo "========================================="
            docker compose --profile prod pull app
            echo "✓ Latest images pulled"
            
            # Clean up unused images and containers
            echo "========================================="
            echo "Cleaning up unused Docker resources..."
            echo "========================================="
            docker system prune -af --volumes || true
            echo "✓ Cleanup completed"
            
            # Start services with fresh containers
            echo "========================================="
            echo "Starting services..."
            echo "========================================="
            docker compose --profile prod up -d --force-recreate --remove-orphans
            echo "✓ Services started"
            
            # Wait a bit for containers to initialize
            echo "========================================="
            echo "Waiting for services to initialize..."
            echo "========================================="
            sleep 10
            
            # Show running containers
            echo "========================================="
            echo "Current running containers:"
            echo "========================================="
            docker compose --profile prod ps
            
            # Show app logs (last 20 lines)
            echo "========================================="
            echo "Recent application logs:"
            echo "========================================="
            docker compose --profile prod logs --tail=20 app
            
            # Check application health
            echo "========================================="
            echo "Checking application health..."
            echo "========================================="
            sleep 5
            if docker compose --profile prod ps | grep -q "yousef_server.*Up"; then
              echo "✓ Application is running"
            else
              echo "✗ WARNING: Application may not be running properly"
              docker compose --profile prod logs app
              exit 1
            fi
            
            echo "========================================="
            echo "✓ Deployment completed successfully!"
            echo "========================================="
            
            # Logout from Docker Hub
            docker logout