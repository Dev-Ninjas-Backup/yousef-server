name: Security Cleanup - Malware Detection & Removal

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - dev
      - main
      - develop
      - staging

jobs:
  security-cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect & Remove Malicious Files
        run: |
          echo "🔍 Starting Security Cleanup Scan..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Create log file
          LOGFILE="malware_scan.log"
          echo "Malware Scan Report - $(date)" > $LOGFILE
          echo "Repository: yousef-server" >> $LOGFILE
          echo "Branch: ${{ github.ref }}" >> $LOGFILE
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> $LOGFILE

          # Define suspicious patterns
          declare -a PATTERNS=(
            "temp_auto_push"
            "config.bat"
            "malware"
            "virus"
            "backdoor"
            "trojan"
            "exploit"
            "payload"
            "shell"
            "crypto"
          )

          FOUND_MALWARE=0

          # Scan for suspicious files
          echo "" | tee -a $LOGFILE
          echo "🔎 Scanning for suspicious filenames..." | tee -a $LOGFILE
          for pattern in "${PATTERNS[@]}"; do
            echo "  Checking for: $pattern" | tee -a $LOGFILE
            found_files=$(find . -type f -iname "*$pattern*" -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./dist/*" 2>/dev/null)
            if [ ! -z "$found_files" ]; then
              echo "  ⚠️  FOUND: $pattern" | tee -a $LOGFILE
              echo "$found_files" | tee -a $LOGFILE
              echo "$found_files" | xargs rm -f
              FOUND_MALWARE=1
            fi
          done

          # Remove suspicious .bat, .ps1, .cmd files from project root
          echo "" | tee -a $LOGFILE
          echo "🧹 Removing suspicious batch/PowerShell scripts..." | tee -a $LOGFILE
          find . -maxdepth 2 -type f \( -name "*.bat" -o -name "*.ps1" -o -name "*.cmd" \) -not -path "./.git/*" 2>/dev/null | while read file; do
            echo "  Deleting: $file" | tee -a $LOGFILE
            rm -f "$file"
            FOUND_MALWARE=1
          done

          # Scan for obfuscated/suspicious JavaScript in config files
          echo "" | tee -a $LOGFILE
          echo "🔎 Scanning for obfuscated JavaScript injections..." | tee -a $LOGFILE

          # Check eslint.config.mjs for suspicious patterns
          if [ -f "eslint.config.mjs" ]; then
            echo "  Checking eslint.config.mjs..." | tee -a $LOGFILE
            if grep -q "global\[" eslint.config.mjs 2>/dev/null || \
               grep -q "eval(" eslint.config.mjs 2>/dev/null || \
               grep -q "Function(" eslint.config.mjs 2>/dev/null; then
              echo "  ⚠️  SUSPICIOUS CODE DETECTED in eslint.config.mjs" | tee -a $LOGFILE
              FOUND_MALWARE=1
              # Show suspicious lines
              grep -n "global\[" eslint.config.mjs >> $LOGFILE 2>/dev/null || true
              grep -n "eval(" eslint.config.mjs >> $LOGFILE 2>/dev/null || true
              grep -n "Function(" eslint.config.mjs >> $LOGFILE 2>/dev/null || true
            fi
          fi

          # Scan all config files for suspicious patterns
          echo "" | tee -a $LOGFILE
          echo "🔎 Scanning config files for suspicious code..." | tee -a $LOGFILE
          for config in nest-cli.json tsconfig.json prisma.config.ts .env .env.local; do
            if [ -f "$config" ]; then
              if grep -qE "(eval\(|Function\(|require\(['\"]fs|global\[|process\.exit|exec\()" "$config" 2>/dev/null; then
                echo "  ⚠️  SUSPICIOUS CODE in $config" | tee -a $LOGFILE
                grep -n "eval\|Function\|require.*fs\|global\[\|process\.exit\|exec(" "$config" >> $LOGFILE 2>/dev/null || true
                FOUND_MALWARE=1
              fi
            fi
          done

          # Check .gitignore for suspicious entries
          echo "" | tee -a $LOGFILE
          echo "🔎 Checking .gitignore for suspicious entries..." | tee -a $LOGFILE
          if [ -f ".gitignore" ]; then
            if grep -qE "(temp_auto_push|config\.bat|virus|malware)" .gitignore 2>/dev/null; then
              echo "  ⚠️  SUSPICIOUS ENTRIES in .gitignore" | tee -a $LOGFILE
              grep "temp_auto_push\|config\.bat\|virus\|malware" .gitignore >> $LOGFILE 2>/dev/null || true
              FOUND_MALWARE=1
            fi
          fi

          # Scan src/ directory for suspicious patterns
          echo "" | tee -a $LOGFILE
          echo "🔎 Scanning src/ directory for suspicious code..." | tee -a $LOGFILE
          if [ -d "src" ]; then
            if grep -r "child_process" src/ --include="*.ts" --include="*.js" 2>/dev/null | grep -qE "(exec|spawn|shell)"; then
              echo "  ⚠️  SUSPICIOUS: child_process usage detected" | tee -a $LOGFILE
              grep -r "child_process" src/ --include="*.ts" --include="*.js" >> $LOGFILE 2>/dev/null || true
              FOUND_MALWARE=1
            fi
          fi

          echo "" | tee -a $LOGFILE
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" | tee -a $LOGFILE

          if [ $FOUND_MALWARE -eq 1 ]; then
            echo "⚠️  MALWARE/SUSPICIOUS CODE DETECTED!" | tee -a $LOGFILE
            echo "✅ Cleaned files will be removed from this build" | tee -a $LOGFILE
          else
            echo "✅ No suspicious files detected" | tee -a $LOGFILE
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" | tee -a $LOGFILE
          cat $LOGFILE

      - name: Upload Scan Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: malware-scan-report
          path: malware_scan.log
          retention-days: 30

      - name: Comment on PR with Findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const logContent = fs.readFileSync('malware_scan.log', 'utf8');
            const hasIssues = logContent.includes('MALWARE') || logContent.includes('SUSPICIOUS');

            const comment = `
            ## 🔒 Security Scan Report

            \`\`\`
            ${logContent}
            \`\`\`

            ${hasIssues ? '⚠️ **SUSPICIOUS CODE DETECTED** - Please review before merging!' : '✅ **No suspicious code detected**'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  lint-and-test:
    needs: security-cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run ESLint
        run: npm run lint 2>/dev/null || true

      - name: Build project
        run: npm run build 2>/dev/null || true

      - name: Run tests
        run: npm run test 2>/dev/null || true
